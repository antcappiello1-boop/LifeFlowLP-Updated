<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Received | LifeFlow Agents</title>
  <meta name="description" content="Your life insurance coverage request has been received." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body { min-height: 100vh; background: #f5f7fb; color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 640px; width: 100%; background: white; border-radius: 28px; padding: 42px; box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12); text-align: center; }
    .check { width: 64px; height: 64px; border-radius: 50%; background: #22c55e; color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; margin-bottom: 20px; }
    h1 { font-size: 36px; margin-bottom: 12px; letter-spacing: -0.8px; }
    p { font-size: 18px; color: #475569; line-height: 1.6; margin-bottom: 16px; }
    .small { font-size: 14px; color: #64748b; }
    a { color: #2563eb; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <div class="check">✓</div>
    <h1>Your request was received.</h1>
    <p>A licensed agent will review your information and reach out shortly to go over your coverage options.</p>
    <p class="small">Please keep your phone nearby. Calls usually come from Anthony.</p>
    <p class="small"><a href="/">Back to LifeFlow Agents</a></p>
  </main>
</body>
</html>
